name: Release scheduled kolam article

on:
  schedule:
    # 18 July 2026, 10:00 IST is 04:30 UTC.
    - cron: "30 4 18 7 *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      article_released: ${{ steps.publish_source.outputs.article_released }}
    steps:
      - name: Check out the website
        uses: actions/checkout@v6

      - name: Confirm the one-time release window
        id: gate
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" || "$(date -u +%F)" == "2026-07-18" ]]; then
            echo "release=true" >> "${GITHUB_OUTPUT}"
          else
            echo "release=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Publish the prepared article source
        id: publish_source
        if: steps.gate.outputs.release == 'true'
        shell: bash
        run: |
          source="writing/releases/from-sixteen-tiles-to-fifty-one-kolams/index.qmd.release"
          target="writing/articles/binary-kolam-tiles/index.qmd"

          if [[ ! -f "${source}" ]]; then
            echo "The prepared release has already been applied."
            echo "article_released=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          cp "${source}" "${target}"
          git rm "${source}"
          git add "${target}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Publish From Sixteen Tiles to Fifty One Kolams"
          git push
          echo "article_released=true" >> "${GITHUB_OUTPUT}"

  build:
    needs: release
    if: needs.release.outputs.article_released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check out the released article
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render the site
        run: quarto render

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload the rendered site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
