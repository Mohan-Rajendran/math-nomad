project:
  type: website
  output-dir: _site
  render:
    - "*.qmd"
    - "courses/**/*.qmd"
    - "writing/**/*.qmd"
    - "videos/**/*.qmd"
    - "projects/**/*.qmd"
    # Keep the former routes available as signposts to the new sections.
    - "explore/**/*.qmd"
    - "read/**/*.qmd"
    - "teach/**/*.qmd"
    - "problems/**/*.qmd"
    - "collections/**/*.qmd"
  preview:
    port: 4200
    browser: true

lang: en-GB

website:
  title: "Math Nomad"
  site-url: "https://mathnomad.in"
  description: "Journeys through mathematics, exploration and teaching."
  favicon: assets/mathnomad-logo.png
  open-graph: true
  twitter-card: true
  search:
    location: navbar
    type: overlay
  back-to-top-navigation: true
  navbar:
    logo: assets/mathnomad-nav-monogram.png
    logo-alt: "Math Nomad home"
    title: "Math Nomad"
    background: light
    pinned: true
    collapse-below: lg
    left:
      - text: Courses
        href: courses/index.qmd
      - text: Writing
        href: writing/index.qmd
      - text: Videos
        href: videos/index.qmd
      - text: Projects
        href: projects/index.qmd
      - text: About
        href: about.qmd
    right:
      - icon: github
        href: "https://github.com/Mohan-Rajendran/math-nomad"
        aria-label: "Math Nomad on GitHub"
  page-footer:
    border: false
    left: "© 2026 Mohan Rajendran · Math Nomad"
    center: |
      <figure class="mn-footer-quote">
        <blockquote>“Mathematics, you see, is not a spectator sport. To understand mathematics means to be able to do mathematics. And what does it mean [to be] doing mathematics? In the first place, it means to be able to solve mathematical problems.”</blockquote>
        <figcaption>— George Pólya, <cite>How to Solve It: A New Aspect of Mathematical Method</cite></figcaption>
      </figure>
    right:
      - text: About
        href: about.qmd

format:
  html:
    theme:
      - cosmo
      - styles.scss
    include-in-header:
      - includes/fonts.html
      - includes/mathjax.html
    template: includes/html-mathjax.html
    html-math-method: mathjax
    toc: true
    toc-depth: 3
    smooth-scroll: true
    code-copy: true
    link-external-newwindow: true
    anchor-sections: true

execute:
  freeze: auto

resources:
  - assets/**
